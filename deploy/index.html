<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Game</title>
    <style>
        html,
        body,
        canvas {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: absolute;
            background: black;
            z-index: 0;
        }
    </style>
</head>
<body>
<canvas id="glcanvas" tabindex='1'></canvas>
<!-- Minified and statically hosted version of https://github.com/not-fl3/macroquad/blob/master/js/mq_js_bundle.js -->
<script src="https://notfl3.github.io/miniquad/mq_js_bundle.js"></script>
<script>
    // Load the WASM binary
    load("flyway.wasm").catch(err => {
        console.error("Failed to load flyway.wasm:", err);
        document.body.innerHTML = "<h1>Error loading game</h1><p>" + err + "</p>";
    });
</script>
</body>
</html>
